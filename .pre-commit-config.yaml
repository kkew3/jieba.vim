repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.14.10
    hooks:
      # Run the linter.
      - id: ruff-check
      # Run the formatter.
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        files: '\.ya?ml$'
      - id: check-yaml
  - repo: local
    hooks:
      - id: cargo-check
        name: cargo clippy check (rust_backend)
        entry: cargo clippy --workspace --manifest-path rust_backend/Cargo.toml
        language: system
        always_run: true
        pass_filenames: false
      - id: cargo-fmt-check
        name: cargo format check (rust_backend)
        entry: cargo fmt --all --check --manifest-path rust_backend/Cargo.toml
        language: system
        types: [rust]
        pass_filenames: false
      - id: outdated-copyright-check
        name: outdated copyright notice check
        entry: uv run --locked --project dev_scripts dev_scripts/check_copyright.py
        language: system
        always_run: true
        pass_filenames: true
      - id: dbg-check
        name: dbg macro check
        entry: uv run --locked --project dev_scripts dev_scripts/check_dbg.py
        language: system
        types: [rust]
        pass_filenames: true
      - id: dont-touch-machine-generated-files
        name: check that machine-generated files are not modified locally
        entry: machine-generated files maintained by the CI pipeline should not be modified locally
        language: fail
        files: '^(test/cases/bootstrap/main\.jieba_test_case|test/cases/bootstrapped/[^_].*\.jieba_test_case)$'
