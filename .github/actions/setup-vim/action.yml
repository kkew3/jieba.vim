name: Setup vim/nvim
description: Setup vim/nvim with +python3/+lua enabled
inputs:
  vim-distr:
    description: 'The vim/nvim distribution name (either "vim" or "nvim")'
    required: true
  vim-version:
    description: 'The vim/nvim version'
    required: true
  glue-lang:
    description: 'The glue language (either "py39" or "lua51")'
    required: true
runs:
  using: composite
  steps:
    - name: Setup python
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'
      if: ${{ inputs.glue-lang == 'py39' }}
    - name: Install pynvim
      shell: bash
      run: pip install pynvim
      if: ${{ inputs.glue-lang == 'py39' && inputs.vim-distr == 'nvim' }}
    - name: Setup lua
      uses: leafo/gh-actions-lua@master
      with:
        luaVersion: '5.1'
      if: ${{ inputs.glue-lang == 'lua51' }}
    - name: Copy lua libs and includes to /usr
      shell: bash
      run: |
        sudo cp -r .lua/include/* /usr/include
        sudo cp -r .lua/lib/* /usr/lib
      if: ${{ inputs.glue-lang == 'lua51' }}
    - name: Compile and install vim
      if: ${{ inputs.vim-distr == 'vim' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends git make clang libtool-bin
        git clone https://github.com/vim/vim.git ~/vim
        cd ~/vim && git checkout ${{ inputs.vim-version }}
        case ${{ inputs.glue-lang }} in
          py39)
            LDFLAGS=-rdynamic ./configure \
              --with-features=huge \
              --enable-fail-if-missing \
              --enable-largefile \
              --enable-multibyte \
              --enable-python3interp \
              --with-python3-command=python3.9 \
              --with-python3-stable-abi=3.9 \
              --enable-gui=no \
              --prefix="$HOME/vim/prefix"
            ;;
          lua51)
            LDFLAGS=-rdynamic ./configure \
              --with-features=huge \
              --enable-fail-if-missing \
              --enable-largefile \
              --enable-multibyte \
              --enable-luainterp
              --enable-gui=no \
              --prefix="$HOME/vim/prefix"
            ;;
        esac
        make && make install
    - name: Compile and install nvim
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends git make clang libtool-bin cmake
        git clone https://github.com/neovim/neovim ~/vim
        cd ~/vim && git checkout ${{ inputs.vim-version }}
        make CMAKE_BUILD_TYPE=RelWithDebInfo CMAKE_INSTALL_PREFIX="$HOME/vim/prefix"
        make install
      if: ${{ inputs.vim-distr == 'nvim' }}
    - name: Add vim/nvim to PATH
      shell: bash
      run: |
        echo "$HOME/vim/prefix/bin" >> $GITHUB_PATH
    - name: Print vim/nvim version
      shell: bash
      run: ${{ inputs.vim-distr }} --version
